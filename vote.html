<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vote Now - SUG Awards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="nav">
    <div class="brand">SUG <span>Awards</span></div>
    <div class="navlinks">
      <a href="index.html" class="tab">Home</a>
      <a href="vote.html" class="tab active">Vote Now</a>
      <a href="leaderboard.html" class="tab">Leaderboard</a>
      <a href="admin.html" class="tab">Admin</a>
    </div>
  </nav>

  <main class="wrap">
    <h1 class="page-title">Cast Your Vote</h1>
    <div class="section tabs" id="voteTabs"></div>
    <div class="section grid" id="voteGrid"></div>
  </main>

  <footer class="footer">Powered by the Student Union Government</footer>

  <div class="modal-bg" id="voteModalBg">
    <div class="modal">
      <button class="close" id="closeVoteModal">×</button>
      <h2 id="modalTitle">Vote</h2>
      <div class="form-group"><label class="label">Full Name</label><input class="input" id="voterName" placeholder="Enter your name"></div>
      <div class="form-group"><label class="label">Email</label><input class="input" id="voterEmail" type="email" placeholder="you@example.com"></div>
      <div class="form-group"><label class="label">Number of Votes</label><input class="input" id="voteQty" type="number" min="1" value="10"></div>
      <div class="form-group"><label class="label">Payment Method</label><select class="input" id="payMethod"><option>Card</option><option>Bank Transfer</option><option>USSD</option><option>Mobile App</option></select></div>
      <button class="primary" id="submitVote">Proceed to Payment</button>
      <div id="voteInfo" class="muted"></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script>
    setActivePage("vote");
    renderVotePage();
  </script>
</body>
</html>
